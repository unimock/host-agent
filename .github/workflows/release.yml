name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build .deb
        run: VERSION="${GITHUB_REF_NAME#v}" nfpm package -p deb -t .

      - name: Create release and attach package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --generate-notes ./*.deb \
            || gh release upload "$GITHUB_REF_NAME" ./*.deb --clobber
